# Actions referenciadas por tag; o Renovate (helpers:pinGitHubActionDigests)
# converte para pin por SHA na primeira PR — ver .github/renovate.json.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Format · Typecheck · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          # História completa: o gate de divulgação varre as MENSAGENS DE COMMIT da PR, e o
          # default (fetch-depth: 1) não tem o range. Sem isto, a varredura de mensagens vira
          # recurso morto — presente no código, nunca executada.
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Antes de qualquer build: nenhuma tese comercial na árvore publicável NEM nas mensagens
      # de commit (que também são públicas para sempre — e um commit que remove a tese pode
      # reintroduzi-la ao citar o que removeu). Vem primeiro porque é o único gate cuja falha
      # é IRREVERSÍVEL depois do push: conteúdo publicado sobrevive em refs/pull/* mesmo após
      # rewrite + force-push. Não depende de build.
      - name: Gate de divulgação (árvore + mensagens de commit)
        run: |
          if [ -n "${{ github.event.pull_request.base.sha }}" ]; then
            pnpm check:disclosure "${{ github.event.pull_request.base.sha }}..${{ github.sha }}"
          else
            pnpm check:disclosure "${{ github.event.before }}..${{ github.sha }}"
          fi
      # o client Prisma é gerado, não versionado — em checkout limpo o
      # @prisma/client exporta stubs sem os modelos e lint/typecheck/build
      # quebram (TS2305). O job test não precisa: vitest não checa tipos e a
      # suíte que instancia o client de verdade exige DATABASE_URL.
      - run: pnpm --filter "./apps/api" exec prisma generate
      # apps/api resolve @pix-live/core via exports → dist/ (sem alias); em
      # checkout limpo o dist não existe e lint (type-aware), typecheck e build
      # quebram (TS2307). O build completo no fim continua validando api/web —
      # este passo só garante os artefatos dos pacotes compartilhados antes.
      - run: pnpm --filter "./packages/*" build
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm typecheck
      - run: pnpm build

  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # a COLETA dos testes de apps/api importa PrismaClient estaticamente —
      # sem generate o import quebra antes do skipIf de integração agir
      # (Cannot find module '.prisma/client/default').
      - run: pnpm --filter "./apps/api" exec prisma generate
      # idem para @pix-live/core: resolve via exports → dist/ (sem alias); em
      # checkout limpo a coleta quebra antes do skipIf. Não "limpar" achando
      # redundante com o job quality — jobs rodam em runners separados.
      - run: pnpm --filter "./packages/*" build
      - run: pnpm test:cov
      - name: Upload coverage
        if: matrix.node == 20
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: error

  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
