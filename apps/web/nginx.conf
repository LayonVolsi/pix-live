# Servidor do front (nginx-unprivileged: uid 101, non-root, porta 8080).
# PRECEDÊNCIA (Q6): em nginx o prefix match mais LONGO vence, independente da
# ordem — /api/ e /health/ sempre ganham do catch-all /; ficam antes só por
# legibilidade.
server {
  listen 8080;
  server_name _;

  # Baseline desta fase (P5); CSP completa e demais headers do host estático
  # entram na fase deploy (backlog B1).
  server_tokens off;

  root /usr/share/nginx/html;
  index index.html;

  # Payloads da demo são pequenos (o cap real da API é 32kb no parser JSON).
  client_max_body_size 64k;

  # Único caminho de entrada pra API — a porta 3000 NÃO é publicada no host
  # (B2). Os proxy_set_header são LOAD-BEARING: a API roda com trust proxy = 1
  # e o throttler conta por req.ip; sem eles o nginx repassaria um
  # X-Forwarded-For forjado pelo cliente e zeraria o rate-limit das rotas mais
  # sensíveis (B2/Q1). $proxy_add_x_forwarded_for APENDA o IP que o nginx viu:
  # a API, confiando em exatamente 1 hop, lê o último salto — o real.
  location /api/ {
    proxy_pass http://api:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location /health/ {
    proxy_pass http://api:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # SPA: rotas do React Router caem no index.html. nosniff só nas respostas
  # estáticas — as proxied já trazem os headers do helmet da API (sem duplicar).
  location / {
    add_header X-Content-Type-Options "nosniff" always;
    try_files $uri $uri/ /index.html;
  }
}
